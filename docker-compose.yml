services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_secret
      POSTGRES_DB: nexus_chatbot_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_chatbot_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: nexus-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/.env:/app/.env
      - chat_media:/app/storage/chat-media
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://nexus:nexus_secret@postgres:5432/nexus_chatbot_db?schema=public
      PORT: 3000
      GITHUB_REPO: vektortechmind/NEXUSZAP-FREE
      COMPOSE_PROJECT_NAME: nexuszap-free
      UPDATE_SCRIPT_PATH: /workspace/update.sh
      UPDATE_STORAGE_DIR: /workspace/updates
      UPDATE_WORKSPACE_DIR: /workspace
      CHAT_MEDIA_STORAGE_ROOT: /app/storage/chat-media
    ports:
      - "3001:3000"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/ping').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  frontend:
    build: ./frontend
    container_name: nexus-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_HTTP_PORT:-8081}:80"

volumes:
  pgdata:
  chat_media:
